project:
  type: book

book:
  title: "乱中寻序：统计学的统一逻辑"
  author: "穿行冷风"
  date: today
  language: zh
  sidebar:
    style: "docked"
    collapse-level: 1
  chapters:
    - index.Rmd
    - part: "Part I: 概率论基础"
      chapters:
        - 01-概率初步与随机变量的分布.Rmd
        - 02-多维随机变量及其分布.Rmd
        - 03-大数定律和中心极限定理.Rmd
        - 04-概率不等式与收敛性.Rmd
    - part: "Part II: 经典统计推断"
      chapters:
        - 05-统计量与抽样分布.Rmd
        - 06-参数估计.Rmd
        - 07-假设检验与方差分析.Rmd
        - 08-贝叶斯统计与计算.Rmd
    - part: "Part III: 现代统计方法"
      chapters:
        - 09-回归分析.Rmd
        - 10-广义线性模型.Rmd
        - 11-类别数据分析.Rmd
        - 12-非参数统计.Rmd
        - 13-时间序列分析.Rmd
        - 14-多元统计分析.Rmd
    - part: "Part IV: 机器学习"
      chapters:
        - 15-机器学习基础.Rmd
        - 16-经典分类方法.Rmd
        - 17-集成学习与模型选择.Rmd
        - 18-深度学习.Rmd
        - 19-因果推断入门.Rmd
    - part: "附录：统计计算工具"
      chapters:
        - A-优化方法.Rmd
        - B-矩阵计算与数值方法.Rmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    fig-align: center
    css: style.css
  pdf:
    pdf-engine: xelatex
    documentclass: book
    papersize: a4
    include-in-header: preamble.tex
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: true
    fig-align: center
