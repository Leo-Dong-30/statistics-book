name: Render and Publish Quarto Book

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgsl-dev libcurl4-openssl-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          pkgs <- c(
            "knitr", "rmarkdown",
            "ggplot2", "MASS", "mvtnorm", "fields",
            "quantreg", "randomForest", "xgboost",
            "forecast", "LearnBayes", "MatchIt",
            "faraway", "rugarch", "keras"
          )
          install.packages(pkgs)
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto book
        run: quarto render --to html

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
